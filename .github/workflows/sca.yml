name: Software Composition Analysis

on:
  workflow_dispatch:  # This allows manual trigger
  workflow_call:  # Allows this workflow to be reusable by other repositories

jobs:
  sca:
    runs-on: ubuntu-latest

    steps:
# Step 1: Checkout the code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

# Step 2: Install Syft and Grype
    - name: Install Syft and Grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
# Step 3: Generate SBOM using Syft
    - name: Generate SBOM
      run: |
        /usr/local/bin/syft version
        /usr/local/bin/syft . -v -o json > sbom.json

# Step 4: Scan SBOM using Grype
    - name: Scan SBOM with Grype
      run: |
        /usr/local/bin/grype version
        /usr/local/bin/grype sbom:sbom.json -v -o json > grype-report.json

# Step 5: Upload the Grype's report to DefectDojo
    - name: Upload Grype report to Defectdojo
      run: |
        TODAY=$(date +%Y-%m-%d)
        product_name=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
        curl -X "POST" "https://demo.defectdojo.org/api/v2/import-scan/" -H "accept: application/json" -H "Authorization: Token 6102b94e0919f66c5bee0ebd0810709df5038104" -H "Content-Type: multipart/form-data" -F file=@semgrep-report.json -F "product_type_name=Clubpay" -F "active=true" -F "verified=true" -F "close_old_findings=true" -F "engagement_name=${GITHUB_RUN_ID}(SAST)" -F "build_id=${GITHUB_RUN_ID}" -F "minimum_severity=Info" -F "close_old_findings_product_scope=true" -F "scan_date=$TODAY" -F "engagement_end_date=$TODAY" -F "commit_hash=${GITHUB_SHA}" -F "product_name=${product_name}" -F "auto_create_context=true" -F "scan_type=Anchore Grype" -F "branch_tag=${GITHUB_REF_NAME}" -F "source_code_management_uri=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

# Step 6: Upload the Grype report as an artifact
    - name: Upload Grype report
      uses: actions/upload-artifact@v4
      with:
        name: grype-report
        path: grype-report.json
